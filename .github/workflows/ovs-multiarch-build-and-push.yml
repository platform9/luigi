---
name: Static Checks
on:
  push:
    branches:
      - private/shweta/ovs
  pull_request:
    branches:
      - private/shweta/ovs
  workflow_dispatch:
  workflow_call:
    inputs:
      image_name:
        type: string
        default: 'openvswitch'
      runs_on:
        type: string
        default: 'ubuntu-latest'
      build_args:
        type: string
        default: ''
      context:
        type: string
        default: 'hostplumber/pkg/ovs-docker'
      platforms:
        type: string
        default: "linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x"
      push:
        type: boolean
        default: true
      tag:
        type: string
        default: test
    secrets:
      registry_username:
        required: true
      registry_password:
        required: true
    
jobs:
  buildx:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v1
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      
      # setup Docker buld action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to the Docker Registry
        uses: docker/login-action@v1
        with:
          username: shwetachavan20
          password: 50$@Shweta
  
      - name: Build/Push image to Docker Container Registry
        uses: docker/build-push-action@v3
        with:
          context: hostplumber/pkg/ovs-docker
          tags: shwetachavan20/openvswitch:test1
          push: true
          build-args: ""
          platfiorms: "linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x"
